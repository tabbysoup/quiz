<style>
  :root {
    --bg: #FBF8F3;
    --card: #FFFFFF;
    --text: #1C1917;
    --muted: #78716C;
    --accent: #6D4AFF;
    --accent-light: #EDE9FF;
    --accent2: #FF6B6B;
    --accent2-light: #FFF0F0;
    --border: #E7E2DC;
    --radius: 20px;
    --radius-sm: 12px;
    --font: 'Zen Maru Gothic', sans-serif;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== START ===== */
  .hero-section {
    text-align: center;
    padding: 48px 0 32px;
  }
  .hero-badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
    letter-spacing: .05em;
  }
  .hero-emoji {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 20px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
  }
  .hero h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .meta-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .meta-item .num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .meta-item .lbl { font-size: 12px; color: var(--muted); }

  /* ===== AFFILIATE CARD ===== */
  .affili-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .affili-card .affili-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: .08em;
  }
  .affili-inner {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .affili-thumb {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: #F5F3FF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }
  .affili-body { flex: 1; min-width: 0; }
  .affili-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .affili-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .affili-btn {
    display: block;
    text-align: center;
    margin-top: 12px;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: opacity .15s;

    padding: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s, opacity .15s;
    box-shadow: 0 4px 20px rgba(109,74,255,.35);
  }
  .start-btn:active { transform: scale(.98); opacity: .9; }

  /* ===== QUIZ ===== */
  .quiz-header {
    padding: 24px 0 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .prog-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .prog-label { font-size: 13px; color: var(--muted); min-width: 40px; }
  .prog-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .prog-fill {
    height: 8px;
    background: var(--accent);
    border-radius: 4px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .choice-btn:active { transform: scale(.99); }
  .choice-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .next-btn {
    display: none;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s, transform .1s;
    box-shadow: 0 4px 16px rgba(109,74,255,.3);
  }
  .next-btn.visible { display: block; }
  .next-btn:active { transform: scale(.98); }

  /* ===== RESULT ===== */
  .result-top {
    text-align: center;
    padding: 40px 0 24px;
  }
  .result-emoji {
    font-size: 96px;
    line-height: 1;
    margin-bottom: 16px;
    display: block;
    animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop {
    from{transform:scale(0);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  .result-type-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .result-name {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tag {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 100px;
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .result-card h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .05em;
  }
  .result-desc { font-size: 15px; line-height: 1.8; }
  .advice-box {
    background: var(--accent-light);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 12px;
  }
  .advice-box .advice-head {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .advice-box p { font-size: 14px; line-height: 1.7; color: var(--text); }

  /* bars */
  .bar-row { margin-bottom: 14px; }
  .bar-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .bar-name { font-size: 13px; font-weight: 700; }
  .bar-pct { font-size: 13px; color: var(--muted); }
  .bar-track {
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 10px;
    border-radius: 5px;
    transition: width .8s cubic-bezier(.4,0,.2,1);

  /* share */
  .share-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .share-btn {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;

  .share-btn.tw { background: #000; color: #fff; border-color: #000; }
  .share-btn.line { background: #06C755; color: #fff; border-color: #06C755; }
  .restart-btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 24px;
  }

  /* result affili */
  .affili-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .05em;
  }
  .affili-list { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>

let scores={all:0,over:0,fil:0,dis:0,mind:0,cat:0,per:0,sho:0,lab:0,emo:0,min:0};
let qIdx=0;
let selected=null;

function startQuiz(){
  show('s-quiz'); showQ();
}

function showQ(){
  const q=Qs[qIdx];
  document.getElementById('prog-label').textContent=`${qIdx+1}/10`;
  document.getElementById('prog-fill').style.width=`${qIdx/10*100}%`;
  document.getElementById('q-scene').textContent=q.scene;
  document.getElementById('q-text').textContent=q.text;
  const c=document.getElementById('choices');
  c.innerHTML='';
  selected=null;
  document.getElementById('next-btn').className='next-btn';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='choice-btn';
    b.textContent=o.text;
    b.onclick=()=>pick(i);
    c.appendChild(b);
  });
}

function pick(i){
  selected=i;
  document.querySelectorAll('.choice-btn').forEach((b,j)=>b.classList.toggle('selected',j===i));
  document.getElementById('next-btn').className='next-btn visible';
}

function nextQ(){
  if(selected===null)return;
  const s=Qs[qIdx].opts[selected].scores;
  Object.entries(s).forEach(([k,v])=>{if(scores[k]!==undefined)scores[k]+=v;});
  qIdx++;
  if(qIdx>=Qs.length){showResult();return;}
  window.scrollTo({top:0,behavior:'smooth'});
  showQ();
}

function showResult(){
  document.getElementById('prog-fill').style.width='100%';
  const ex=['min'];
  const valid=Object.entries(scores).filter(([k])=>!ex.includes(k));
  valid.sort((a,b)=>b[1]-a[1]);
  const topKey=valid[0][0];
  const t=Types[topKey];
  document.getElementById('r-emoji').textContent=t.emoji;
  document.getElementById('r-name').textContent=t.name;
  document.getElementById('r-sub').textContent=t.sub;
  document.getElementById('r-tags').innerHTML=t.tags.map(tg=>`<span class="tag">${tg}</span>`).join('');
  document.getElementById('r-desc').textContent=t.desc;
  document.getElementById('r-advice').textContent=t.advice;

  const top5=valid.slice(0,5);
  const mx=top5[0][1]||1;
  document.getElementById('r-bars').innerHTML=top5.map(([k,v])=>{
    const tp=Types[k]; if(!tp)return'';
    const pct=Math.round(v/mx*100);
    return`<div class="bar-row">
      <div class="bar-top"><span class="bar-name">${tp.emoji} ${tp.name}</span><span class="bar-pct">${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${tp.color}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('r-affili').innerHTML=t.affili.map(a=>`
    <div class="affili-card">
      <div class="affili-label">PR</div>
      <div class="affili-inner">
        <div class="affili-thumb">${a.emoji}</div>
        <div class="affili-body">
          <div class="affili-title">${a.title}</div>
          <div class="affili-desc">${a.desc}</div>
        </div>
      </div>
      <a href="${a.link}" class="affili-btn" target="_blank" rel="noopener">詳しく見る →</a>
    </div>`).join('');

  show('s-result');
  window.scrollTo({top:0,behavior:'smooth'});
}

function shareTwitter(){
  const name=document.getElementById('r-name').textContent;
  const emoji=document.getElementById('r-emoji').textContent;
  const text=`私の認知の歪みタイプは「${emoji} ${name}」でした！あなたは？%0A%0A%23認知の歪み診断 %23心理テスト`;
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(location.href)}`,'_blank');
}

function shareLine(){
  const name=document.getElementById('r-name').textContent;
  const emoji=document.getElementById('r-emoji').textContent;
  const text=`私の認知の歪みタイプは「${emoji} ${name}」でした！あなたも試してみて → ${location.href}`;
  window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`,'_blank');
}

function restart(){
  scores={all:0,over:0,fil:0,dis:0,mind:0,cat:0,per:0,sho:0,lab:0,emo:0,min:0};
  qIdx=0;selected=null;
  show('s-start');
  window.scrollTo({top:0,behavior:'smooth'});
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
